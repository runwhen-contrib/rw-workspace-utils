images:
  # RunWhen Local images (simpler tagging)
  - image: "$REGISTRY_REPOSITORY_PATH/runwhen-local"
    set_path: "runwhenLocal.image.tag"
    category: "runwhen_local"
  - image: "$REGISTRY_REPOSITORY_PATH/opentelemetry-collector"
    set_path: "opentelemetry-collector.image.tag"
    category: "runwhen_local"
  - image: "$REGISTRY_REPOSITORY_PATH/runner"
    set_path: "runner.image.tag"
    category: "runwhen_local"
  # CodeCollection images (catalog-driven tagging)
  - image: "$REGISTRY_REPOSITORY_PATH/rw-cli-codecollection"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "rw-cli-codecollection"
  - image: "$REGISTRY_REPOSITORY_PATH/rw-public-codecollection"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "rw-public-codecollection"
  - image: "$REGISTRY_REPOSITORY_PATH/rw-generic-codecollection"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "rw-generic-codecollection"
  - image: "$REGISTRY_REPOSITORY_PATH/rw-workspace-utils"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "rw-workspace-utils"
  - image: "$REGISTRY_REPOSITORY_PATH/azure-c7n-codecollection"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "azure-c7n-codecollection"
  - image: "$REGISTRY_REPOSITORY_PATH/aws-c7n-codecollection"
    set_path: "runner.runEnvironment.image"
    category: "codecollection"
    slug: "aws-c7n-codecollection"
